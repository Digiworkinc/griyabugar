                                if (snap.empty) {
                                    INITIAL_BRANCHES.forEach(b => branchesRef.doc(b.id).set(b));
                                } else {
                                    const loadedBranches = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                    setBranches(loadedBranches);
                                    localStorage.setItem('gb_branches_v5', JSON.stringify(loadedBranches));
                                }
                            }, console.error);

                            const settingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings');
                            unsubSettings = settingsRef.onSnapshot((snap) => {
                                const configDoc = snap.docs.find(d => d.id === 'config');
                                if (configDoc) {
                                    const data = configDoc.data();
                                    setSettings(data);
                                    setTempSettings(data);
                                    localStorage.setItem('gb_settings_v5', JSON.stringify(data));
                                } else if (snap.empty) {
                                    settingsRef.doc('config').set(DEFAULT_SETTINGS);
                                }
                            }, console.error);

                            const bookingsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('bookings');

                                const loadedBookings = snap.docs.map(doc => ({ fbId: doc.id, ...doc.data() }));

                                localStorage.setItem('gb_bookings_v5', JSON.stringify(loadedBookings));

                const dateObj = new Date(formData.date);

                const formattedDate = isNaN(dateObj.getTime()) ? formData.date : dateObj.toLocaleDateString(currentLang === 'id' ? 'id-ID' : 'en-US', options);

                message = message.replace(/\[TELEPON\]/g, formData.phone);

                    {successBooking && (
                        <div className="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex justify-center items-center p-4">
                            <div className="bg-white rounded-3xl max-w-lg w-full p-6 sm:p-8 border border-brandGold/20 shadow-2xl relative">
                                <button onClick={() => setSuccessBooking(null)} className="absolute top-4 right-4 p-1.5 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><X size={18} /></button>
                                <div className="text-center mb-5">
                                    <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-md shadow-emerald-100"><CheckCircle2 size={28} className="text-emerald-600" /></div>
                                    <h3 className="font-serif text-2xl font-bold text-slate-800">{currentLang === 'id' ? 'Draf Pesan Telah Siap!' : 'Message Draft Ready!'}</h3>
                                    <p className="text-xs text-slate-500 mt-1">{currentLang === 'id' ? 'Satu langkah lagi untuk melakukan konfirmasi pemesanan ke cabang Griya Bugar.' : 'One final step to submit and confirm your booking with Griya Bugar branch.'}</p>
                                </div>

                                <div className="bg-brandCream border border-brandGold/30 p-4 rounded-2xl mb-4 text-center">
                                    <span className="text-[10px] font-bold text-brandBrown/60 uppercase tracking-widest block mb-1">
                                        {TRANSLATIONS[currentLang].booking_code_label}
                                    </span>
                                    <span className="font-mono text-xl sm:text-2xl font-black text-brandBrown tracking-wider block">
                                        {successBooking.code}
                                    </span>
                                    <button 
                                        onClick={() => handleCopyBookingCode(successBooking.code)}
                                        className="mt-2 inline-flex items-center gap-1 text-[11px] text-brandGoldDark hover:text-brandBrown font-bold transition focus:outline-none"
                                    >
                                        <Copy size={12} /> {TRANSLATIONS[currentLang].btn_copy_code}
                                    </button>
                                </div>

                                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200/80 mb-5 text-left">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">Isi Pesan WhatsApp:</p>
                                    <div className="text-xs font-mono text-slate-700 bg-white p-3 rounded-xl border border-slate-100 whitespace-pre-wrap leading-relaxed max-h-40 overflow-y-auto">{successBooking.messagePreview}</div>
                                </div>
                                <div className="space-y-3">
                                    <a href={successBooking.link} target="_blank" rel="noopener noreferrer" onClick={() => setSuccessBooking(null)} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl transition shadow-lg flex justify-center items-center gap-2 text-sm">
                                        Hubungkan ke WhatsApp Sekarang <ExternalLink size={14} />
                                    </a>
                                    <button onClick={() => setSuccessBooking(null)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-2xl text-xs transition">Kembali, Ubah Data Booking</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
