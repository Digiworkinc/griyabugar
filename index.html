    <!-- React App Script (Transpiled by Babel in iframe runtime) -->

        const { useState, useEffect, useRef } = React;
        
        // Custom Lucide integration for React without complex ESM structures

        const User = ({ className, size = 20 }) => <i className={`fa-solid fa-user ${className}`} style={{ fontSize: size }}></i>;
        const Phone = ({ className, size = 20 }) => <i className={`fa-solid fa-phone ${className}`} style={{ fontSize: size }}></i>;
        const Settings = ({ className, size = 20 }) => <i className={`fa-solid fa-gears ${className}`} style={{ fontSize: size }}></i>;
        const BookOpen = ({ className, size = 20 }) => <i className={`fa-solid fa-book-open ${className}`} style={{ fontSize: size }}></i>;
        const Plus = ({ className, size = 16 }) => <i className={`fa-solid fa-plus ${className}`} style={{ fontSize: size }}></i>;
        const Trash2 = ({ className, size = 16 }) => <i className={`fa-solid fa-trash-can ${className}`} style={{ fontSize: size }}></i>;
        const Edit2 = ({ className, size = 16 }) => <i className={`fa-solid fa-pen-to-square ${className}`} style={{ fontSize: size }}></i>;
        const Save = ({ className, size = 16 }) => <i className={`fa-solid fa-floppy-disk ${className}`} style={{ fontSize: size }}></i>;
        const CheckCircle2 = ({ className, size = 24 }) => <i className={`fa-solid fa-circle-check ${className}`} style={{ fontSize: size }}></i>;
        const ExternalLink = ({ className, size = 16 }) => <i className={`fa-solid fa-arrow-up-right-from-square ${className}`} style={{ fontSize: size }}></i>;
        const MessageSquare = ({ className, size = 18 }) => <i className={`fa-solid fa-comment-dots ${className}`} style={{ fontSize: size }}></i>;
        const AlertCircle = ({ className, size = 18 }) => <i className={`fa-solid fa-triangle-exclamation ${className}`} style={{ fontSize: size }}></i>;
        const HelpCircle = ({ className, size = 18 }) => <i className={`fa-solid fa-circle-question ${className}`} style={{ fontSize: size }}></i>;
        const TrendingUp = ({ className, size = 16 }) => <i className={`fa-solid fa-chart-line ${className}`} style={{ fontSize: size }}></i>;
        const X = ({ className, size = 18 }) => <i className={`fa-solid fa-xmark ${className}`} style={{ fontSize: size }}></i>;
        const Lock = ({ className, size = 18 }) => <i className={`fa-solid fa-lock ${className}`} style={{ fontSize: size }}></i>;
        const ShieldCheck = ({ className, size = 20 }) => <i className={`fa-solid fa-shield-halved ${className}`} style={{ fontSize: size }}></i>;

        const INITIAL_BRANCHES = [
            { id: 'jogja-pakuningratan', name: 'Pakuningratan', region: 'Yogyakarta', price: 127500, address: 'Jl. Pakuningratan No.3, Kec. Jetis', phone: '082124499924', rating: '4.9 ★', hours: '09:00 - 22:00' },
            { id: 'jogja-maguwo', name: 'Maguwo', region: 'Yogyakarta', price: 127500, address: 'Jl. Ring Road Utara No. Kav. 27, Maguwoharjo', phone: '082124499924', rating: '4.8 ★', hours: '09:00 - 22:00' },
            { id: 'jogja-seturan', name: 'Seturan', region: 'Yogyakarta', price: 127500, address: 'Jl. Seturan Raya No. Kav. 99 B Lt.1', phone: '082124499924', rating: '4.9 ★', hours: '09:00 - 22:00' },
            { id: 'solo-baru', name: 'Solo Baru', region: 'Solo', price: 110000, address: 'Jl. Ir. Soekarno, Ruko Solo Baru Blok HH 36', phone: '082124499924', rating: '4.8 ★', hours: '09:00 - 22:00' },
            { id: 'solo-gede', name: 'Pasar Gede', region: 'Solo', price: 110000, address: 'Jl. Urip Sumoharjo No.62 B (Utara Pasar Gede)', phone: '082124499924', rating: '4.7 ★', hours: '09:00 - 22:00' },
            { id: 'malang-suhat', name: 'Soekarno Hatta (Suhat)', region: 'Malang', price: 115000, address: 'Jl. Soekarno Hatta, Ruko Taman Niaga Blok B 32-33', phone: '082124499924', rating: '4.8 ★', hours: '09:00 - 22:00' },
            { id: 'bali-1', name: 'Bali 1', region: 'Bali', price: 140000, address: 'Jl. Bypass Ngurah Rai, Tuban, Kuta', phone: '082124499924', rating: '4.9 ★', hours: '09:00 - 22:00' }
        ];

        const DEFAULT_SETTINGS = {
            whatsapp: '6282124499924',
            template: 'Halo Griya Bugar [CABANG], saya ingin konfirmasi booking sesi kebugaran melalui Website.\n\n*Detail Pesanan:*\n- Nama: [NAMA]\n- No. WA: [TELEPON]\n- Tanggal: [TANGGAL]\n- Jam: [JAM]\n- Layanan: [LAYANAN]\n- Total Bayar: [HARGA]\n\nCatatan: [CATATAN]\n\nMohon diproses, terima kasih.'
        };

        const TRANSLATIONS = {
            id: {
                tagline: "PIJAT BENAR BENAR PIJAT • SINCE 1998",
                nav_home: "Home",
                nav_about: "Tentang Kami",
                nav_services: "Layanan",
                nav_branches: "Cabang",
                nav_booking: "Booking Online",
                nav_promos: "Promo",
                nav_articles: "Artikel",
                nav_franchise: "Kemitraan",
                nav_contact: "Kontak",
                nav_admin: "Admin",
                hero_sub: "Hadir di 5 Kota Besar Indonesia dengan Standar Pelayanan Terbaik. Didukung terapis berpengalaman tinggi untuk kebugaran maksimal Anda.",
                hero_cta_book: "Booking Sekarang",
                hero_cta_branches: "Lihat Cabang",
                stat_branches: "Cabang Nasional",
                stat_therapists: "Terapis Profesional",
                stat_customers: "Pelanggan Puas",
                stat_rating: "Rating Pelanggan",
                loc_prompt_title: "Izinkan Akses Lokasi?",
                loc_prompt_desc: "Kami akan merekomendasikan cabang Griya Bugar terdekat dari posisi Anda saat ini.",
                loc_prompt_yes: "Ya, Izinkan",
                loc_prompt_no: "Nanti Saja",
                loc_rec_tag: "Cabang Terdekat Terdeteksi",
                loc_rec_open: "Buka 09:00 - 22:00 • Layanan Profesional",
                loc_rec_detail: "Detail Cabang",
                wa_online: "Online",
                wa_card_desc: "Pilih cabang terdekat untuk langsung berkonsultasi via WhatsApp.",
                learn_more: "Pelajari Selengkapnya",
                mins: "Menit",
                visit_branch: "Kunjungi Cabang",
                back_to_branches: "Kembali ke Semua Cabang",
                branch_highlights: "Keistimewaan Cabang",
                meet_specialists: "Tim Terapis Ahli Kami",
                form_booking_title: "Formulir Booking Online",
                form_booking_desc: "Isi detail sesi pemesanan Anda untuk diteruskan secara cepat via WhatsApp."
            },
            en: {
                tagline: "PURE AUTHENTIC MASSAGE • SINCE 1998",
                nav_home: "Home",
                nav_about: "About Us",
                nav_services: "Services",
                nav_branches: "Branches",
                nav_booking: "Online Booking",
                nav_promos: "Promos",
                nav_articles: "Articles",
                nav_franchise: "Franchise",
                nav_contact: "Contact",
                nav_admin: "Admin",
                hero_sub: "Present in 5 Major Indonesian Cities with top luxury service standards. Supported by highly experienced therapists for your ultimate wellness.",
                hero_cta_book: "Book Now",
                hero_cta_branches: "View Branches",
                stat_branches: "National Branches",
                stat_therapists: "Professional Therapists",
                stat_customers: "Satisfied Customers",
                stat_rating: "Customer Rating",
                loc_prompt_title: "Allow Location Access?",
                loc_prompt_desc: "We will recommend the nearest Griya Bugar branch relative to your current location.",
                loc_prompt_yes: "Yes, Allow",
                loc_prompt_no: "Later",
                loc_rec_tag: "Nearest Branch Detected",
                loc_rec_open: "Open 09:00 - 22:00 • Professional Services",
                loc_rec_detail: "Branch Details",
                wa_online: "Online",
                wa_card_desc: "Choose the nearest branch to consult directly via WhatsApp.",
                learn_more: "Learn More",
                mins: "Minutes",
                visit_branch: "Visit Branch",
                back_to_branches: "Back to All Branches",
                branch_highlights: "Branch Highlights",
                meet_specialists: "Meet Our Specialists",
                form_booking_title: "Online Session Booking",
                form_booking_desc: "Fill in your session details to compile a quick reservation dispatch message via WhatsApp."
            }
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [currentLang, setCurrentLang] = useState('id');
            const [branches, setBranches] = useState([]);
            const [settings, setSettings] = useState(DEFAULT_SETTINGS);
            const [loading, setLoading] = useState(true);
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);
            const [dbStatusMsg, setDbStatusMsg] = useState('Inisialisasi sistem...');
            
            // UI States
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isWaWidgetOpen, setIsWaWidgetOpen] = useState(false);
            const [isLocationPromptOpen, setIsLocationPromptOpen] = useState(false);
            const [isLocationRecommended, setIsLocationRecommended] = useState(false);
            const [selectedBranchId, setSelectedBranchId] = useState('jogja-pakuningratan');
            
            // Custom dialog modal states
            const [dialogConfig, setDialogConfig] = useState(null); // { title, message, onConfirm, showCancel }
            const [toast, setToast] = useState(null); // { title, message, type }

            // Booking Engine Form State
            const [formData, setFormData] = useState({
                name: '',
                phone: '',
                branchId: 'jogja-pakuningratan',
                date: '',
                time: '',
                service: 'Pijat Tradisional Sehat',
                notes: ''
            });
            const [successBooking, setSuccessBooking] = useState(null);

            // Admin Panel Authentication
            const [adminAuthenticated, setAdminAuthenticated] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState('');

            // Admin Dashboard fields
            const [newBranch, setNewBranch] = useState({ name: '', region: 'Yogyakarta', price: '', address: '', phone: '082124499924' });
            const [editingBranchId, setEditingBranchId] = useState(null);
            const [editingBranchData, setEditingBranchData] = useState({ name: '', region: '', price: '', address: '', phone: '' });
            const [tempSettings, setTempSettings] = useState({ whatsapp: '', template: '' });

            const showToast = (title, message, type = 'success') => {
                setToast({ title, message, type });
                setTimeout(() => setToast(null), 4000);
            };

            const triggerConfirm = (title, message, onConfirm) => {
                setDialogConfig({
                    title,
                    message,
                    showCancel: true,
                    onConfirm: () => {
                        onConfirm();
                        setDialogConfig(null);
                    }
                });
            };

            const triggerAlert = (title, message) => {
                setDialogConfig({
                    title,
                    message,
                    showCancel: false,
                    onConfirm: () => setDialogConfig(null)
                });
            };

            useEffect(() => {
                const initApp = async () => {
                    // We run a robust local/state environment for the user, integrating standard local storage
                    setIsFirebaseConnected(false);
                    setDbStatusMsg("Menggunakan database lokal terintegrasi (Demo & Launch Mode).");
                    
                    const localBranches = localStorage.getItem('gb_branches_v2');
                    const localSettings = localStorage.getItem('gb_settings_v2');
                    
                    if (localBranches) {
                        setBranches(JSON.parse(localBranches));
                    } else {
                        setBranches(INITIAL_BRANCHES);
                        localStorage.setItem('gb_branches_v2', JSON.stringify(INITIAL_BRANCHES));
                    }

                    if (localSettings) {
                        setSettings(JSON.parse(localSettings));
                        setTempSettings(JSON.parse(localSettings));
                    } else {
                        setSettings(DEFAULT_SETTINGS);
                        setTempSettings(DEFAULT_SETTINGS);
                        localStorage.setItem('gb_settings_v2', JSON.stringify(DEFAULT_SETTINGS));
                    }
                    
                    setLoading(false);

                    // Open geolocation prompt after 3 seconds
                    setTimeout(() => {
                        setIsLocationPromptOpen(true);
                    }, 3000);
                };

                initApp();
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const formatIDR = (num) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0
                }).format(num);
            };

            const getSelectedBranch = () => {
                return branches.find(b => b.id === formData.branchId) || branches[0];
            };

            const currentBranchObj = getSelectedBranch();
            const currentPrice = currentBranchObj ? currentBranchObj.price : 127500;

            const handleBookingSubmit = (e) => {
                e.preventDefault();
                if (!formData.branchId) {
                    triggerAlert("Data Tidak Lengkap", "Silakan pilih cabang terlebih dahulu.");
                    return;
                }

                const formattedPrice = formatIDR(currentPrice);
                const dateObj = new Date(formData.date);
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const formattedDate = isNaN(dateObj.getTime()) ? formData.date : dateObj.toLocaleDateString(currentLang === 'id' ? 'id-ID' : 'en-US', options);

                // Compile WhatsApp redirect template string
                let message = settings.template;
                message = message.replace(/\[NAMA\]/g, formData.name);
                message = message.replace(/\[TELEPON\]/g, formData.phone);
                message = message.replace(/\[CABANG\]/g, currentBranchObj.name + ` (${currentBranchObj.region})`);
                message = message.replace(/\[TANGGAL\]/g, formattedDate);
                message = message.replace(/\[JAM\]/g, formData.time + ' WIB');
                message = message.replace(/\[LAYANAN\]/g, formData.service);
                message = message.replace(/\[HARGA\]/g, formattedPrice);
                message = message.replace(/\[CATATAN\]/g, formData.notes || '-');

                // Route message to branch's phone if configured, fallback to global settings
                const branchPhoneNum = currentBranchObj.phone || settings.whatsapp;
                const sanitizedPhone = branchPhoneNum.replace(/[^0-9]/g, '');
                const finalPhone = sanitizedPhone.startsWith('0') ? '62' + sanitizedPhone.substring(1) : sanitizedPhone;

                const waLink = `https://api.whatsapp.com/send?phone=${finalPhone}&text=${encodeURIComponent(message)}`;
                
                setSuccessBooking({
                    link: waLink,
                    messagePreview: message,
                    whatsappNum: finalPhone
                });
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === 'griyabugar' || adminPassword === 'admin') {
                    setAdminAuthenticated(true);
                    setAdminError('');
                    showToast("Login Berhasil", "Selamat datang di halaman administrasi terpusat.", "success");
                } else {
                    setAdminError(currentLang === 'id' ? 'Sandi salah. Coba: "griyabugar"' : 'Incorrect Password. Try: "griyabugar"');
                }
            };

            const handleSaveSettings = (e) => {
                e.preventDefault();
                setSettings(tempSettings);
                localStorage.setItem('gb_settings_v2', JSON.stringify(tempSettings));
                showToast("Pengaturan Disimpan", "Template WhatsApp dan nomor utama berhasil diperbarui.", "success");
            };

            const handleAddBranch = (e) => {
                e.preventDefault();
                if (!newBranch.name || !newBranch.price) {
                    triggerAlert("Gagal Menambahkan", "Harap isi semua kolom untuk menambahkan cabang baru.");
                    return;
                }

                const priceNum = Number(newBranch.price);
                if (isNaN(priceNum) || priceNum <= 0) {
                    triggerAlert("Input Salah", "Harga harus berupa angka positif.");
                    return;
                }

                const randomId = 'branch-' + Date.now();
                const branchPayload = {
                    id: randomId,
                    name: newBranch.name,
                    region: newBranch.region,
                    price: priceNum,
                    address: newBranch.address || 'Alamat Cabang Baru',
                    phone: newBranch.phone || '082124499924',
                    rating: '4.8 ★',
                    hours: '09:00 - 22:00'
                };

                const updated = [...branches, branchPayload];
                setBranches(updated);
                localStorage.setItem('gb_branches_v2', JSON.stringify(updated));

                setNewBranch({ name: '', region: 'Yogyakarta', price: '', address: '', phone: '082124499924' });
                showToast("Cabang Ditambahkan", "Cabang baru berhasil disimpan ke database.", "success");
            };

            const handleDeleteBranch = (id, name) => {
                triggerConfirm(
                    "Konfirmasi Hapus",
                    `Apakah Anda yakin ingin menghapus cabang ${name}?`,
                    () => {
                        const updated = branches.filter(b => b.id !== id);
                        setBranches(updated);
                        localStorage.setItem('gb_branches_v2', JSON.stringify(updated));
                        showToast("Cabang Dihapus", `Cabang ${name} telah berhasil dihapus dari sistem.`, "success");
                    }
                );
            };

            const startEditBranch = (branch) => {
                setEditingBranchId(branch.id);
                setEditingBranchData({
                    name: branch.name,
                    region: branch.region,
                    price: branch.price,
                    address: branch.address,
                    phone: branch.phone
                });
            };

            const handleSaveEditBranch = (id) => {
                const priceNum = Number(editingBranchData.price);
                if (isNaN(priceNum) || priceNum <= 0) {
                    triggerAlert("Input Salah", "Harga harus berupa angka positif.");
                    return;
                }

                const updated = branches.map(b => b.id === id ? { id, ...editingBranchData, price: priceNum } : b);
                setBranches(updated);
                localStorage.setItem('gb_branches_v2', JSON.stringify(updated));
                setEditingBranchId(null);
                showToast("Cabang Diperbarui", "Data perubahan cabang berhasil disimpan.", "success");
            };

            return (
                <div className="flex flex-col min-h-screen">
                    
                    {/* TOAST NOTIFICATION */}
                    {toast && (
                        <div className="fixed top-4 right-4 left-4 sm:left-auto sm:right-6 z-50 pointer-events-none flex flex-col max-w-sm mx-auto sm:mx-0">
                            <div className={`bg-brandBrown text-white border-l-4 ${toast.type === 'success' ? 'border-brandGold' : 'border-rose-500'} p-4 rounded-2xl shadow-2xl flex items-start gap-3 pointer-events-auto transition-all`}>
                                <div className="text-brandGold mt-0.5"><i className="fa-solid fa-bell"></i></div>
                                <div>
                                    <h5 className="font-bold text-xs">{toast.title}</h5>
                                    <p className="text-[10px] text-brandCream/80 mt-1">{toast.message}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CUSTOM POPUP DIALOG MODAL (Replaces alert/confirm) */}
                    {dialogConfig && (
                        <div className="fixed inset-0 z-50 bg-slate-950/70 backdrop-blur-sm flex justify-center items-center p-4">
                            <div className="bg-white rounded-3xl max-w-md w-full p-6 border border-brandGold/20 shadow-2xl text-center">
                                <div className="w-12 h-12 bg-brandCream text-brandGold rounded-full flex items-center justify-center mx-auto mb-3">
                                    <AlertCircle size={24} className="text-brandGold" />
                                </div>
                                <h4 className="font-serif text-lg font-bold text-brandBrown mb-2">{dialogConfig.title}</h4>
                                <p className="text-xs text-brandBrown/70 leading-relaxed mb-6">{dialogConfig.message}</p>
                                <div className="flex gap-3 justify-center">
                                    {dialogConfig.showCancel && (
                                        <button 
                                            onClick={() => setDialogConfig(null)}
                                            className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs rounded-xl transition"
                                        >
                                            {currentLang === 'id' ? 'Batal' : 'Cancel'}
                                        </button>
                                    )}
                                    <button 
                                        onClick={dialogConfig.onConfirm}
                                        className="px-5 py-2 bg-brandGold hover:bg-brandGoldDark text-white font-bold text-xs rounded-xl transition"
                                    >
                                        OK
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* GEOLOCATION NOTIFIER */}
                    {isLocationPromptOpen && (
                        <div className="fixed bottom-4 left-4 right-4 sm:left-6 sm:right-auto z-40 max-w-sm bg-white border border-brandGold/30 rounded-2xl p-5 shadow-2xl transition-all">
                            <div className="flex items-start gap-4">
                                <div className="bg-brandGold/10 p-3 rounded-full text-brandGold flex-shrink-0">
                                    <MapPin size={22} className="text-brandGold" />
                                </div>
                                <div>
                                    <h4 className="font-semibold text-brandBrown text-sm">{TRANSLATIONS[currentLang].loc_prompt_title}</h4>
                                    <p class="text-xs text-brandBrown/70 mt-1">{TRANSLATIONS[currentLang].loc_prompt_desc}</p>
                                    <div className="mt-4 flex gap-3">
                                        <button 
                                            onClick={() => {
                                                setIsLocationPromptOpen(false);
                                                showToast("Lokasi Diizinkan", "Mencari cabang Griya Bugar terdekat...", "success");
                                                setTimeout(() => setIsLocationRecommended(true), 1500);
                                            }} 
                                            className="bg-brandGold hover:bg-brandGoldDark text-white text-xs font-semibold py-2 px-4 rounded-xl transition min-h-[44px]"
                                        >
                                            {TRANSLATIONS[currentLang].loc_prompt_yes}
                                        </button>

                                                    <div className="space-y-1.5">
                                                        <label className="text-slate-400 font-bold uppercase">Alamat Lengkap</label>
                                                        <input type="text" required value={newBranch.address} onChange={(e) => setNewBranch({ ...newBranch, address: e.target.value })} placeholder="Alamat cabang" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:ring-1 focus:ring-brandGold" />
                                                    </div>
                                                    <div className="space-y-1.5">
                                                        <label className="text-slate-400 font-bold uppercase">Nomor WA Khusus</label>
                                                        <input type="text" required value={newBranch.phone} onChange={(e) => setNewBranch({ ...newBranch, phone: e.target.value })} placeholder="Nomor WA Cabang" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:ring-1 focus:ring-brandGold" />
                                                    </div>
                                                    <div className="space-y-1.5 flex gap-2">
                                                        <div className="w-full">
                                                            <label className="text-slate-400 font-bold uppercase">Harga (Rupiah)</label>
                                                            <input type="number" required value={newBranch.price} onChange={(e) => setNewBranch({ ...newBranch, price: e.target.value })} placeholder="127500" className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:ring-1 focus:ring-brandGold" />
                                                        </div>
                                                        <button type="submit" className="bg-brandGold hover:bg-brandGoldDark text-slate-950 font-bold px-3 py-2 rounded-lg shrink-0 flex items-center justify-center"><Plus size={16} /></button>
                                                    </div>
                                                </form>

                                                <div className="overflow-x-auto border border-slate-700 rounded-2xl text-xs">
                                                    <table className="w-full text-left">
                                                        <thead className="bg-slate-900 text-slate-300 font-bold uppercase tracking-wider">
                                                            <tr>
                                                                <th className="px-4 py-3">Cabang</th>
                                                                <th className="px-4 py-3">Wilayah</th>
                                                                <th className="px-4 py-3">Alamat</th>
                                                                <th className="px-4 py-3">Harga Web (1 Jam)</th>
                                                                <th className="px-4 py-3 text-right">Aksi</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-800">
                                                            {branches.map(b => {
                                                                const isEditing = editingBranchId === b.id;
                                                                return (
                                                                    <tr key={b.id} className="hover:bg-slate-800/40 transition">
                                                                        <td className="px-4 py-3 font-semibold text-brandGold">
                                                                            {isEditing ? <input type="text" value={editingBranchData.name} onChange={(e) => setEditingBranchData({ ...editingBranchData, name: e.target.value })} className="px-2 py-1 rounded bg-slate-700 text-white w-full" /> : b.name}
                                                                        </td>
                                                                        <td className="px-4 py-3">
                                                                            {isEditing ? (
                                                                                <select value={editingBranchData.region} onChange={(e) => setEditingBranchData({ ...editingBranchData, region: e.target.value })} className="px-2 py-1 rounded bg-slate-700 text-white">
                                                                                    <option value="Yogyakarta">Yogyakarta</option>
                                                                                    <option value="Solo">Solo</option>
                                                                                    <option value="Malang">Malang</option>
                                                                                    <option value="Semarang">Semarang</option>
                                                                                    <option value="Bali">Bali</option>
                                                                                </select>
                                                                            ) : b.region}
                                                                        </td>
                                                                        <td className="px-4 py-3 text-slate-400">
                                                                            {isEditing ? <input type="text" value={editingBranchData.address} onChange={(e) => setEditingBranchData({ ...editingBranchData, address: e.target.value })} className="px-2 py-1 rounded bg-slate-700 text-white w-full" /> : b.address}
                                                                        </td>
                                                                        <td className="px-4 py-3 font-mono font-bold text-brandGold">
                                                                            {isEditing ? <input type="number" value={editingBranchData.price} onChange={(e) => setEditingBranchData({ ...editingBranchData, price: e.target.value })} className="px-2 py-1 rounded bg-slate-700 text-white w-24" /> : formatIDR(b.price)}
                                                                        </td>
                                                                        <td className="px-4 py-3 text-right">
                                                                            <div className="flex justify-end gap-2">
                                                                                {isEditing ? (
                                                                                    <>
                                                                                        <button onClick={() => handleSaveEditBranch(b.id)} className="p-1 text-emerald-400 hover:bg-slate-700 rounded"><Save size={14} /></button>
                                                                                        <button onClick={() => setEditingBranchId(null)} className="p-1 text-slate-400 hover:bg-slate-700 rounded"><X size={14} /></button>
                                                                                    </>
                                                                                ) : (
                                                                                    <>
                                                                                        <button onClick={() => startEditBranch(b)} className="p-1 text-blue-400 hover:bg-slate-700 rounded"><Edit2 size={14} /></button>
                                                                                        <button onClick={() => handleDeleteBranch(b.id, b.name)} className="p-1 text-rose-400 hover:bg-slate-700 rounded"><Trash2 size={14} /></button>
                                                                                    </>
                                                                                )}
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>

                                            </div>

                                        </div>
                                    )}

                                </div>
                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer className="bg-brandBrown text-brandCream pt-16 pb-12 border-t border-brandGold/20 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-4 gap-8 pb-12 mb-8 border-b border-brandCream/10 text-xs sm:text-sm">
                            <div className="space-y-4">
                                <span className="font-serif text-2xl tracking-widest text-brandGold font-bold">GRIYA BUGAR</span>
                                <p className="text-xs text-brandCream/80 leading-relaxed max-w-sm">Griya Bugar Massage Profesional menghadirkan keselarasan jasmani, kesehatan relaksasi, dan pemijatan tepercaya dengan terapis profesional berpengalaman sejak 1998.</p>
                            </div>
                            <div className="space-y-4">
                                <h4 className="font-serif text-brandGold text-base font-semibold">Tautan Navigasi</h4>
                                <ul className="space-y-3 text-xs text-brandCream/80">
                                    <li><button onClick={() => setCurrentPage('about')} className="hover:text-brandGold transition">Tentang Griya Bugar</button></li>
                                    <li><button onClick={() => setCurrentPage('services')} className="hover:text-brandGold transition">Katalog Layanan</button></li>
                                    <li><button onClick={() => setCurrentPage('branches')} className="hover:text-brandGold transition">Lokasi Cabang</button></li>
                                    <li><button onClick={() => setCurrentPage('promos')} className="hover:text-brandGold transition">Promo Bulanan</button></li>
                                    <li><button onClick={() => setCurrentPage('articles')} className="hover:text-brandGold transition">Artikel Kesehatan</button></li>
                                </ul>
                            </div>
                            <div className="space-y-4">
                                <h4 className="font-serif text-brandGold text-base font-semibold font-serif">Menu Treatment</h4>
                                <ul className="space-y-3 text-xs text-brandCream/80">
                                    <li><button onClick={() => setCurrentPage('services')} className="hover:text-brandGold transition">Pijat Tradisional Sehat</button></li>
                                    <li><button onClick={() => setCurrentPage('services')} className="hover:text-brandGold transition">Reflexology & Acupressure</button></li>
                                    <li><button onClick={() => setCurrentPage('services')} className="hover:text-brandGold transition">Sport Recovery & Deep Tissue</button></li>
                                </ul>
                            </div>
                            <div className="space-y-4">
                                <h4 className="font-serif text-brandGold text-base font-semibold">Investor & Kemitraan</h4>
                                <ul className="space-y-3 text-xs text-brandCream/80">
                                    <li><button onClick={() => setCurrentPage('franchise')} className="hover:text-brandGold transition text-left">Waralaba Franchise</button></li>
                                    <li><button onClick={() => setCurrentPage('franchise')} className="hover:text-brandGold transition text-left">Sistem Kemitraan</button></li>
                                </ul>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between text-xs text-brandCream/60 gap-4">
                            <p>&copy; 2026 Griya Bugar Massage Profesional. Hak Cipta Dilindungi Undang-Undang.</p>
                            <div className="flex space-x-6">
                                <a href="#" className="hover:text-brandGold transition">Syarat & Ketentuan</a>
                                <a href="#" className="hover:text-brandGold transition">Kebijakan Privasi</a>
                            </div>
                        </div>
                    </footer>

                    {/* MODAL SUCCESS BOOKING DISPATCH DETAIL */}
                    {successBooking && (
                        <div className="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex justify-center items-center p-4">
                            <div className="bg-white rounded-3xl max-w-lg w-full p-6 sm:p-8 border border-brandGold/20 shadow-2xl relative">
                                <button onClick={() => setSuccessBooking(null)} className="absolute top-4 right-4 p-1.5 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all"><X size={18} /></button>
                                <div className="text-center mb-6">
                                    <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-md shadow-emerald-100"><CheckCircle2 size={28} className="text-emerald-600" /></div>
                                    <h3 className="font-serif text-2xl font-bold text-slate-800">Draf Pesan Telah Siap!</h3>
                                    <p className="text-xs text-slate-500 mt-1">Satu langkah lagi untuk melakukan konfirmasi pemesanan ke cabang Griya Bugar.</p>
                                </div>
                                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200/80 mb-6 text-left">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 block">Isi Pesan WhatsApp:</p>
                                    <div className="text-xs font-mono text-slate-700 bg-white p-3 rounded-xl border border-slate-100 whitespace-pre-wrap leading-relaxed max-h-48 overflow-y-auto">{successBooking.messagePreview}</div>
                                </div>
                                <div className="space-y-3">
                                    <a href={successBooking.link} target="_blank" rel="noopener noreferrer" onClick={() => setSuccessBooking(null)} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-2xl transition shadow-lg flex justify-center items-center gap-2 text-sm">
                                        Hubungkan ke WhatsApp Sekarang <ExternalLink size={14} />
                                    </a>
                                    <button onClick={() => setSuccessBooking(null)} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-2xl text-xs transition">Kembali, Ubah Data Booking</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Mount App to browser DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
